title: "정욱의 데이터 플랫폼 노트"
description: "Data Platform Engineer의 데이터 플랫폼, 파이프라인, Delta Lake 운영 기록"
url: "https://yes-wook.github.io"
baseurl: ""
repository: "yes-wook/yes-wook.github.io"
locale: "ko-KR"
timezone: "Asia/Seoul"

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"
plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap

markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate: 10
paginate_path: /page:num/
search: false
breadcrumbs: false

author:
  name: "김정욱"
  avatar: "/img/profile.jpg"
  bio: "Data Platform Engineer"
  location: "Seoul, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yes-wook"
    - label: "Medium"
      icon: "fab fa-fw fa-medium"
      url: "https://medium.com/@yeswook"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/yeswook/"

include:
  - _pages
exclude:
  - _archive
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: "_pages"
    values:
      layout: single
      author_profile: false
